spring.application.name=finance-tracker
server.port=8080

# ─── Azure Cosmos DB ─────────────────────────────────────────────────────────
spring.cloud.azure.cosmos.endpoint=${AZURE_COSMOS_ENDPOINT}
spring.cloud.azure.cosmos.key=${AZURE_COSMOS_KEY}
spring.cloud.azure.cosmos.database=financetracker
spring.cloud.azure.cosmos.populate-query-metrics=false

# ─── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-this-secret-to-at-least-32-characters!!}
jwt.expiration-ms=604800000

# ─── Azure Blob Storage ───────────────────────────────────────────────────────
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:receipts}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.financetracker=INFO
