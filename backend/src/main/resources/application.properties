spring.application.name=finance-tracker
server.port=8080

# ─── Database (H2 file-based — persists between restarts) ───────────────────
spring.datasource.url=jdbc:h2:file:./data/finance_tracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── H2 console — browse your data at http://localhost:8080/h2-console ───────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ─── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Secret must be >= 32 characters for HS256. Change before deploying.
jwt.secret=${JWT_SECRET:change-this-secret-to-at-least-32-characters!!}
# 7 days in milliseconds
jwt.expiration-ms=604800000

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.financetracker=INFO
